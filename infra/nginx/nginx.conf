worker_processes auto;
events { worker_connections 1024; }

http {
    upstream watchers {
        least_conn;
        server watcher-1:8080 max_fails=3 fail_timeout=5s;
        server watcher-2:8080 max_fails=3 fail_timeout=5s;
    }

    upstream queries {
        least_conn;
        server query-1:8080 max_fails=3 fail_timeout=5s;
        server query-2:8080 max_fails=3 fail_timeout=5s;
    }

    upstream recalcs {
        server recalc-1:8080 max_fails=3 fail_timeout=5s;
    }

    log_format short '$remote_addr $request_time $status "$request"';
    access_log /var/log/nginx/access.log short;

    server {
        listen 80;

        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /clicks {
            proxy_pass http://watchers;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ads/ {
            proxy_pass http://queries;
            proxy_set_header Host $host;
        }

        location = /recalc {
            proxy_pass http://recalcs;
            proxy_set_header Host $host;
        }

        location /actuator/ { return 404; }
    }

    server {
        listen 8081;
        location = /stub_status {
            stub_status;
            allow all;
        }
    }
}
