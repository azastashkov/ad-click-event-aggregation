name: acea

networks:
  acea-net:
    driver: bridge

volumes:
  zk1-data: {}
  zk2-data: {}
  zk3-data: {}
  zk1-log: {}
  zk2-log: {}
  zk3-log: {}
  kafka1-data: {}
  kafka2-data: {}
  kafka3-data: {}
  cassandra1-data: {}
  cassandra2-data: {}
  cassandra3-data: {}
  prometheus-data: {}
  grafana-data: {}

x-zk-common: &zk-common
  image: confluentinc/cp-zookeeper:7.7.1
  restart: on-failure
  networks: [acea-net]
  environment: &zk-env
    ZOOKEEPER_CLIENT_PORT: 2181
    ZOOKEEPER_TICK_TIME: 2000
    ZOOKEEPER_INIT_LIMIT: 10
    ZOOKEEPER_SYNC_LIMIT: 5
    ZOOKEEPER_SERVERS: "zk-1:2888:3888;zk-2:2888:3888;zk-3:2888:3888"
    ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,mntr,ruok,stat,conf"

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.7.1
  restart: on-failure
  networks: [acea-net]
  environment: &kafka-env
    KAFKA_ZOOKEEPER_CONNECT: "zk-1:2181,zk-2:2181,zk-3:2181"
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"

x-cassandra-env: &cassandra-env
  CASSANDRA_CLUSTER_NAME: "acea-cluster"
  CASSANDRA_DC: "dc1"
  CASSANDRA_RACK: "rack1"
  CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
  HEAP_NEWSIZE: "128M"
  MAX_HEAP_SIZE: "1024M"

x-app-common: &app-common
  restart: on-failure
  networks:
    - acea-net

services:
  zk-1:
    <<: *zk-common
    environment:
      <<: *zk-env
      ZOOKEEPER_SERVER_ID: 1
    volumes:
      - zk1-data:/var/lib/zookeeper/data
      - zk1-log:/var/lib/zookeeper/log
  zk-2:
    <<: *zk-common
    environment:
      <<: *zk-env
      ZOOKEEPER_SERVER_ID: 2
    volumes:
      - zk2-data:/var/lib/zookeeper/data
      - zk2-log:/var/lib/zookeeper/log
  zk-3:
    <<: *zk-common
    environment:
      <<: *zk-env
      ZOOKEEPER_SERVER_ID: 3
    volumes:
      - zk3-data:/var/lib/zookeeper/data
      - zk3-log:/var/lib/zookeeper/log

  zoonavigator:
    image: elkozmon/zoonavigator:1.1.3
    depends_on: [zk-1]
    environment:
      HTTP_PORT: "9000"
      CONNECTION_ACEA_NAME: "acea"
      CONNECTION_ACEA_CONN: "zk-1:2181,zk-2:2181,zk-3:2181"
      AUTO_CONNECT_CONNECTION_ID: "ACEA"
    ports: ["9000:9000"]
    networks: [acea-net]

  kafka-1:
    <<: *kafka-common
    depends_on: [zk-1, zk-2, zk-3]
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:19092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:9092,EXTERNAL://localhost:19092"
    volumes: ["kafka1-data:/var/lib/kafka/data"]
    ports: ["19092:19092"]
  kafka-2:
    <<: *kafka-common
    depends_on: [zk-1, zk-2, zk-3]
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 2
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:19093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:9092,EXTERNAL://localhost:19093"
    volumes: ["kafka2-data:/var/lib/kafka/data"]
    ports: ["19093:19093"]
  kafka-3:
    <<: *kafka-common
    depends_on: [zk-1, zk-2, zk-3]
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 3
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:19094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-3:9092,EXTERNAL://localhost:19094"
    volumes: ["kafka3-data:/var/lib/kafka/data"]
    ports: ["19094:19094"]

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on: [kafka-1, kafka-2, kafka-3]
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        BOOTSTRAP=kafka-1:9092
        for i in $$(seq 1 60); do
          if kafka-topics --bootstrap-server $$BOOTSTRAP --list >/dev/null 2>&1; then break; fi
          echo "waiting for kafka ($$i)..."; sleep 2
        done
        ensure() {
          local name=$$1 partitions=$$2
          kafka-topics --bootstrap-server $$BOOTSTRAP --create \
            --if-not-exists --topic "$$name" --partitions $$partitions --replication-factor 3 \
            --config min.insync.replicas=2
        }
        ensure ad-click-events 6
        ensure aggregated-counts 6
        ensure recalc-ad-click-events 3
        ensure recalc-aggregated-counts 3
        echo "topics ready"
        kafka-topics --bootstrap-server $$BOOTSTRAP --list
    networks: [acea-net]

  cassandra-1:
    image: cassandra:4.1
    environment:
      <<: *cassandra-env
      CASSANDRA_SEEDS: "cassandra-1"
    volumes: ["cassandra1-data:/var/lib/cassandra"]
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' | wc -l | grep -q '[1-9]'"]
      interval: 15s
      timeout: 10s
      retries: 30
    networks: [acea-net]
  cassandra-2:
    image: cassandra:4.1
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      <<: *cassandra-env
      CASSANDRA_SEEDS: "cassandra-1"
    volumes: ["cassandra2-data:/var/lib/cassandra"]
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' | wc -l | grep -q '[1-9]'"]
      interval: 15s
      timeout: 10s
      retries: 30
    networks: [acea-net]
  cassandra-3:
    image: cassandra:4.1
    depends_on:
      cassandra-2:
        condition: service_healthy
    environment:
      <<: *cassandra-env
      CASSANDRA_SEEDS: "cassandra-1"
    volumes: ["cassandra3-data:/var/lib/cassandra"]
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' | wc -l | grep -q '[1-9]'"]
      interval: 15s
      timeout: 10s
      retries: 30
    networks: [acea-net]

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    volumes:
      - ./infra/cassandra/schema.cql:/schema.cql:ro
    command:
      - |
        set -euo pipefail
        for i in $$(seq 1 60); do
          if cqlsh cassandra-1 -e 'DESCRIBE CLUSTER' >/dev/null 2>&1; then break; fi
          echo "waiting for cassandra ($$i)..."; sleep 3
        done
        cqlsh cassandra-1 -f /schema.cql
        echo "cassandra schema applied"
    networks: [acea-net]

  watcher-1: &watcher
    <<: *app-common
    image: acea/click-event-watcher:local
    depends_on: [kafka-init]
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "watcher-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
  watcher-2:
    <<: *watcher
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "watcher-2"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"

  raw-writer-1: &raw-writer
    <<: *app-common
    image: acea/raw-database-writer:local
    depends_on: [kafka-init, cassandra-init]
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "raw-writer-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"
  raw-writer-2:
    <<: *raw-writer
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "raw-writer-2"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"

  agg-1: &agg
    <<: *app-common
    image: acea/aggregation-service:local
    depends_on: [kafka-init]
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "agg-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      APP_STREAMS_APPLICATION_ID: "agg-service"
      APP_STREAMS_SOURCE_TOPIC: "ad-click-events"
      APP_STREAMS_SINK_TOPIC: "aggregated-counts"
  agg-2:
    <<: *agg
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "agg-2"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      APP_STREAMS_APPLICATION_ID: "agg-service"
      APP_STREAMS_SOURCE_TOPIC: "ad-click-events"
      APP_STREAMS_SINK_TOPIC: "aggregated-counts"

  agg-writer-1: &agg-writer
    <<: *app-common
    image: acea/aggregation-database-writer:local
    depends_on: [kafka-init, cassandra-init]
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "agg-writer-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"
  agg-writer-2:
    <<: *agg-writer
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "agg-writer-2"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"

  query-1: &query
    <<: *app-common
    image: acea/query-service:local
    depends_on: [cassandra-init]
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "query-1"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"
  query-2:
    <<: *query
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "query-2"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"

  recalc-1:
    <<: *app-common
    image: acea/recalculation-service:local
    depends_on: [kafka-init, cassandra-init]
    environment:
      SERVER_PORT: "8080"
      INSTANCE_ID: "recalc-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      CASSANDRA_CONTACT_POINTS: "cassandra-1:9042,cassandra-2:9042,cassandra-3:9042"

  nginx:
    image: nginx:1.27-alpine
    depends_on: [watcher-1, watcher-2, query-1, query-2, recalc-1]
    ports:
      - "80:80"
      - "8081:8081"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [acea-net]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports: ["9090:9090"]
    networks: [acea-net]

  grafana:
    image: grafana/grafana:11.2.0
    depends_on: [prometheus]
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["3000:3000"]
    networks: [acea-net]

  load-client:
    image: acea/load-test-client:local
    profiles: ["test"]
    depends_on: [nginx]
    environment:
      TARGET_URL: "http://nginx/clicks"
      RECALC_URL: "http://nginx/recalc"
      QUERY_URL: "http://nginx"
      RPS: "500"
      WARMUP_SECONDS: "30"
      DURATION_SECONDS: "120"
      COOLDOWN_SECONDS: "30"
      AD_CARDINALITY: "200"
      METRICS_PORT: "9095"
    ports: ["9095:9095"]
    networks: [acea-net]
