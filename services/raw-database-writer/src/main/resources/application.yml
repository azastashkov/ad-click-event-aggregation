server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: raw-database-writer
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

cassandra:
  contact-points: ${CASSANDRA_CONTACT_POINTS:localhost:9042}
  local-dc: ${CASSANDRA_LOCAL_DC:dc1}

instance:
  id: ${INSTANCE_ID:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      access: read_only

logging:
  level:
    root: INFO
    org.apache.kafka: WARN
