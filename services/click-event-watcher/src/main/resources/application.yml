server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: click-event-watcher
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

instance:
  id: ${INSTANCE_ID:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      access: read_only
    health:
      access: read_only
  metrics:
    tags:
      application: click-event-watcher

logging:
  level:
    root: INFO
    org.apache.kafka.clients.NetworkClient: WARN
